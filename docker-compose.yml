services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    command: ["sentinel", "dashboard"]

  pipeline:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    command: ["sentinel", "run"]
    profiles:
      - batch
